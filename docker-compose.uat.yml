services:
  # PostgreSQL Database (UAT)
  postgres:
    image: postgres:16-alpine
    container_name: ${PROJECT_NAME:-horizon-digital}_postgres_uat
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-horizon_digital_uat}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_uat_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache & Message Broker (UAT)
  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-horizon-digital}_redis_uat
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_uat_data:/data
    ports:
      - "${REDIS_PORT:-6381}:6379"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Django Backend (UAT)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-horizon-digital}_backend_uat
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 2 --worker-class gevent
    env_file:
      - .env
    environment:
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=core.settings.base
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-horizon_digital_uat}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - static_uat_volume:/app/staticfiles
      - media_uat_volume:/app/media
    ports:
      - "${BACKEND_PORT:-8002}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Celery Worker (UAT)
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-horizon-digital}_celery_worker_uat
    command: celery -A core worker -l info --concurrency=2
    env_file:
      - .env
    environment:
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=core.settings.base
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-horizon_digital_uat}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - app_network
    restart: unless-stopped

  # Celery Beat (UAT)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-horizon-digital}_celery_beat_uat
    command: celery -A core beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=core.settings.base
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-horizon_digital_uat}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - app_network
    restart: unless-stopped

  # React Frontend (UAT)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-horizon-digital}_frontend_uat
    env_file:
      - .env
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-https://uat-api.horizondigital.com}
      - VITE_APP_NAME=${VITE_APP_NAME:-Horizon Digital (UAT)}
      - NODE_ENV=production
    ports:
      - "${FRONTEND_PORT:-3002}:3000"
    depends_on:
      - backend
    networks:
      - app_network
    restart: unless-stopped

  # Nginx Reverse Proxy (UAT)
  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME:-horizon-digital}_nginx_uat
    ports:
      - "${NGINX_HTTP_PORT:-8081}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx/nginx.uat.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/uat.conf:/etc/nginx/conf.d/default.conf:ro
      - static_uat_volume:/var/www/static
      - media_uat_volume:/var/www/media
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_uat_data:
  redis_uat_data:
  static_uat_volume:
  media_uat_volume:

networks:
  app_network:
    driver: bridge
    name: ${PROJECT_NAME:-horizon-digital}_uat_network
