services:
  # PostgreSQL Database (Development)
  postgres:
    image: postgres:16-alpine
    container_name: ${PROJECT_NAME:-horizon-digital}_postgres_dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-horizon_digital_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    networks:
      - app_network

  # Redis Cache & Message Broker (Development)
  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-horizon-digital}_redis_dev
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    ports:
      - "${REDIS_PORT:-6380}:6379"
    networks:
      - app_network

  # Django Backend (Development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-horizon-digital}_backend_dev
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    environment:
      - DEBUG=True
      - DJANGO_ENV=dev
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-horizon_digital_dev}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./backend:/app
      - static_dev_volume:/app/staticfiles
      - media_dev_volume:/app/media
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - app_network

  # Celery Worker (Development)
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-horizon-digital}_celery_worker_dev
    command: celery -A core worker -l debug
    env_file:
      - .env
    environment:
      - DEBUG=True
      - DJANGO_ENV=dev
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-horizon_digital_dev}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - app_network

  # Celery Beat (Development)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-horizon-digital}_celery_beat_dev
    command: celery -A core beat -l debug --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      - DEBUG=True
      - DJANGO_ENV=dev
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-horizon_digital_dev}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - app_network

  # React Frontend (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-horizon-digital}_frontend_dev
    command: npm run dev -- --host 0.0.0.0
    env_file:
      - .env
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8080}
      - VITE_APP_NAME=${VITE_APP_NAME:-Horizon Digital (Dev)}
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/dist
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    depends_on:
      - backend
    networks:
      - app_network

  # Nginx Reverse Proxy (Development)
  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME:-horizon-digital}_nginx_dev
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - static_dev_volume:/var/www/static
      - media_dev_volume:/var/www/media
    depends_on:
      - backend
      - frontend
    networks:
      - app_network

volumes:
  postgres_dev_data:
  redis_dev_data:
  static_dev_volume:
  media_dev_volume:

networks:
  app_network:
    driver: bridge
    name: ${PROJECT_NAME:-horizon-digital}_dev_network
